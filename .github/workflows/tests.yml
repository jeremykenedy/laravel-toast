name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['12.*', '13.*']
        include:
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '13.*'
            testbench: '10.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run Pest tests
        run: vendor/bin/pest

  lint:
    runs-on: ubuntu-latest
    name: Pint

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run Pint
        run: vendor/bin/pint --test

  js-check:
    runs-on: ubuntu-latest
    name: Frontend components

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Vue component
        run: test -f resources/js/vue/pages/ToastContainer.vue

      - name: Verify React component
        run: test -f resources/js/react/pages/ToastContainer.jsx

      - name: Verify Svelte component
        run: test -f resources/js/svelte/pages/ToastContainer.svelte

      - name: Check Vue for all props
        run: |
          for prop in dir show_border show_close progress_position enter_animation exit_animation pause_on_hover opacity auto_dismiss; do
            grep -q "$prop" resources/js/vue/pages/ToastContainer.vue || (echo "Vue missing: $prop" && exit 1)
          done

      - name: Check React for all props
        run: |
          for prop in dir show_border show_close progress_position enter_animation exit_animation pause_on_hover opacity auto_dismiss; do
            grep -q "$prop" resources/js/react/pages/ToastContainer.jsx || (echo "React missing: $prop" && exit 1)
          done

      - name: Check Svelte for all props
        run: |
          for prop in dir show_border show_close progress_position enter_animation exit_animation pause_on_hover opacity auto_dismiss; do
            grep -q "$prop" resources/js/svelte/pages/ToastContainer.svelte || (echo "Svelte missing: $prop" && exit 1)
          done
